    <script>
      (function(l) {
        if (l.search[1] === 'p') {
          var decoded = l.search.slice(1).split('&').reduce(function(s, v) {
            var p = v.split('=');
            return p[0] === 'p' ? s + '/' + p[1].replace(/~and~/g, '&') :
                   p[0] === 'q' ? s + '?' + p[1].replace(/~and~/g, '&') : s;
          }, '');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      }(window.location));
    </script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
